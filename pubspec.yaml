name: ya_pomodoro_sf
description: "Yet, another pomodoro: Simple and Free"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.5.2
  flutter_local_notifications: ^17.2.4
  audioplayers: ^6.1.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.3
  fake_async: ^1.3.2

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/audio/
